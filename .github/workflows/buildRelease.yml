# Build Release — Builds a numbered release as Docker images and pushes to ECR.
#
# Manually triggered from the master branch. Validates the version input, builds both
# nginx and tomcat images in parallel, pushes them to ECR, tags the commit, and creates
# a GitHub release with auto-generated notes. For snapshot builds, see Build Snapshot.

name: Build Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Release Version (e.g. 9.0.0)'
                required: true
                type: string
            is-hotfix:
                description: 'As hotfix. Check when releasing a hotfix to a version other than the latest.'
                required: true
                default: false
                type: boolean

# Run all release builds one-by-one, but never cancel a release build due to another one.
concurrency:
    group: build-release
    cancel-in-progress: false

env:
    APP_CODE: toolbox

jobs:
    validate:
        # Guards against accidental release from develop. Requires master for standard
        # releases and a branch other than master (or develop) when is-hotfix is set.
        if: github.ref != 'refs/heads/develop' && ((github.ref == 'refs/heads/master') != inputs.is-hotfix)

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6
          with:
              fetch-depth: 0
              fetch-tags: true

        # Checkout is required to be called with `fetch-depth: 0` and `fetch-tags: true`.
        - name: Validate release version
          uses: xh/hoist-dev-utils/.github/actions/validate-release-version@master
          with:
              version: ${{ inputs.version }}
              is-hotfix: ${{ inputs.is-hotfix }}

    build-tomcat:
        needs: validate

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6

        - name: Setup JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'
              cache: 'gradle'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v5

        - name: Build WAR
          env:
              VERSION: ${{ inputs.version }}
          run: ./gradlew -PxhAppVersion="$VERSION" -PxhAppBuild="${GITHUB_SHA::7}" war

        - name: Copy WAR into Docker context
          run: cp build/libs/*.war docker/tomcat/${{ env.APP_CODE }}.war

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}

        - name: Login to Amazon ECR
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build and push tomcat image
          env:
              ECR_ROOT: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
              VERSION: ${{ inputs.version }}
          run: |
              docker build -t $ECR_ROOT/xh/${{ env.APP_CODE }}-tomcat:$VERSION \
                           -t $ECR_ROOT/xh/${{ env.APP_CODE }}-tomcat:latest \
                           docker/tomcat
              docker push $ECR_ROOT/xh/${{ env.APP_CODE }}-tomcat:$VERSION
              docker push $ECR_ROOT/xh/${{ env.APP_CODE }}-tomcat:latest

    build-nginx:
        needs: validate

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
              node-version-file: 'client-app/.nvmrc'
              cache: 'yarn'
              cache-dependency-path: 'client-app/yarn.lock'

        - name: Configure Font Awesome registry auth
          env:
              FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN }}
          run: echo "//npm.fontawesome.com/:_authToken=$FONTAWESOME_PACKAGE_TOKEN" >> client-app/.npmrc

        - name: Install dependencies and build client app
          run: cd client-app && yarn install --frozen-lockfile && yarn lint && yarn build

        - name: Copy client build into Docker context
          run: cp -r client-app/build/ docker/nginx/build/

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}

        - name: Login to Amazon ECR
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build and push nginx image
          env:
              ECR_ROOT: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
              VERSION: ${{ inputs.version }}
          run: |
              docker build -t $ECR_ROOT/xh/${{ env.APP_CODE }}-nginx:$VERSION \
                           -t $ECR_ROOT/xh/${{ env.APP_CODE }}-nginx:latest \
                           docker/nginx
              docker push $ECR_ROOT/xh/${{ env.APP_CODE }}-nginx:$VERSION
              docker push $ECR_ROOT/xh/${{ env.APP_CODE }}-nginx:latest

    release:
        needs: [ build-tomcat, build-nginx ]

        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        - uses: actions/checkout@v6
          with:
              fetch-depth: 0
              fetch-tags: true

        # Note: The tag intentionally points to a commit where gradle.properties still has
        # the SNAPSHOT version. We chose not to commit the version change back to the repo to
        # avoid paired set/reset commits on every release. The built WAR artifact has the
        # correct release version — the tag is just a pointer to the source commit.
        # Checkout is required to be called with `fetch-depth: 0` and `fetch-tags: true`.
        - name: Create tag and GitHub release
          uses: xh/hoist-dev-utils/.github/actions/create-tag-and-github-release@master
          with:
              version: ${{ inputs.version }}
              is-hotfix: ${{ inputs.is-hotfix }}
          env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}